<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Upgrader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⚡ Апгрейд скинов</h1>
        <div class="balance-box">
            <span>💰 Баланс:</span>
            <span id="balanceDisplay">0</span>
        </div>
        
        <div class="actions">
            <button id="depositBtn">💵 Пополнить (+ случайная сумма)</button>
            <button id="upgradeBtn">🎲 Апгрейд! (Стоимость: 50)</button>
        </div>
        
        <div id="message" class="message"></div>
        <div id="history" class="history"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
